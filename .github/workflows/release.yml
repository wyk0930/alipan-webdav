name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
          - os: ubuntu-latest
            label: linux-x64
          - os: macos-latest
            label: macos-aarch64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: oracle
          java-version: '25'

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libx11-6 libxtst6 libxxf86vm1 libgl1

      - name: Extract version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"
          # macOS jpackage 要求 app-version 首位不能为 0，补成 1.x.x 格式
          MAJOR="${VERSION%%.*}"
          if [ "$MAJOR" = "0" ]; then
            echo "MAC_APP_VERSION=1.${VERSION#0.}" >> "$GITHUB_ENV"
          else
            echo "MAC_APP_VERSION=$VERSION" >> "$GITHUB_ENV"
          fi

      - name: Build
        run: mvn clean package -q

      - name: Prepare jpackage input
        run: |
          mkdir -p dist/jpackage-cli dist/jpackage-fx
          cp cli/target/alipan-webdav-cli-*.jar dist/jpackage-cli/
          cp fx/target/alipan-webdav-fx-*.jar dist/jpackage-fx/
          # 去掉 original- 开头的 jar
          rm -f dist/jpackage-cli/original-* dist/jpackage-fx/original-*

      - name: Find jar filenames
        run: |
          CLI_JAR=$(basename dist/jpackage-cli/*.jar)
          FX_JAR=$(basename dist/jpackage-fx/*.jar)
          echo "CLI_JAR=$CLI_JAR" >> "$GITHUB_ENV"
          echo "FX_JAR=$FX_JAR" >> "$GITHUB_ENV"

      - name: Package CLI (app-image)
        run: |
          JPKG_VERSION="$APP_VERSION"
          if [ "$RUNNER_OS" = "macOS" ]; then
            JPKG_VERSION="$MAC_APP_VERSION"
          fi
          ARGS=(
            --name alipan-webdav
            --input dist/jpackage-cli
            --main-jar "$CLI_JAR"
            --main-class com.alipan.webdav.cli.Main
            --type app-image
            --dest dist
            --app-version "$JPKG_VERSION"
          )
          if [ "$RUNNER_OS" = "Windows" ]; then
            ARGS+=(--win-console)
          fi
          jpackage "${ARGS[@]}"

      - name: Package GUI (app-image)
        run: |
          JPKG_VERSION="$APP_VERSION"
          if [ "$RUNNER_OS" = "macOS" ]; then
            JPKG_VERSION="$MAC_APP_VERSION"
          fi
          jpackage \
            --name WebDAV \
            --input dist/jpackage-fx \
            --main-jar "$FX_JAR" \
            --main-class com.alipan.webdav.fx.Launcher \
            --type app-image \
            --dest dist \
            --java-options "--add-opens=java.base/java.lang=ALL-UNNAMED" \
            --app-version "$JPKG_VERSION"

      - name: Compress artifacts
        run: |
          cd dist
          if [ "$RUNNER_OS" = "Windows" ]; then
            7z a -tzip "alipan-webdav-cli-${APP_VERSION}-${{ matrix.label }}.zip" alipan-webdav/
            7z a -tzip "WebDAV-${APP_VERSION}-${{ matrix.label }}.zip" WebDAV/
          elif [ "$RUNNER_OS" = "macOS" ]; then
            tar -czf "alipan-webdav-cli-${APP_VERSION}-${{ matrix.label }}.tar.gz" alipan-webdav.app/
            tar -czf "WebDAV-${APP_VERSION}-${{ matrix.label }}.tar.gz" WebDAV.app/
          else
            tar -czf "alipan-webdav-cli-${APP_VERSION}-${{ matrix.label }}.tar.gz" alipan-webdav/
            tar -czf "WebDAV-${APP_VERSION}-${{ matrix.label }}.tar.gz" WebDAV/
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/alipan-webdav-cli-*.${{ matrix.os == 'windows-latest' && 'zip' || 'tar.gz' }}
            dist/WebDAV-*.${{ matrix.os == 'windows-latest' && 'zip' || 'tar.gz' }}
